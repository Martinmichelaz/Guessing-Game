<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title></title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	
	<header>
		<h1></h1>
	</header>
	
	<main>
		<div class="num-letters">
			<label>number of letters</label>
			<select>
				<option value="3">3</option>
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6">6</option>
				<option value="7">7</option>
				<option value="8">8</option>
				<option value="9">9</option>
				<option value="10">10</option>
			</select>
			<div class="score">
				<p></p>
			</div>
		</div>
		
		<div class="container">
			<div class="trys">
				<h2>trys</h2>
				<div class="trys-inputs">
					<div class="for-buttons">
						<button class="check">check word</button>
						<button class="hints">hints</button>
					</div>
				</div>
			</div>
			
			<div class="keys-colors">
				<div class="warning-trys">
					<p>you have 5 trys take care</p>
				</div>
				<div>
					<div class="orange"></div>
					<p>not correct place</p>
				</div>
				<div>
					<div class="green"></div>
					<p>correct</p>
				</div>
				<div>
					<div class="red"></div>
					<p>wrong</p>
				</div>
			</div>
			
			<div class="message"></div>
		</div>
	</main>
	
	<footer>
		<p></p>
	</footer>
	
	<script src="script.js"></script>
	
</body>

</html>
